# Liquid catalog for the ClassifyLiquid task.
#
# ClassifyLiquid decouples SMELL from LOOK: the policy classifies the liquid by
# its odor, while the *container* is a cup mesh chosen at random every episode.
# So a liquid here binds only to a VOC recipe (see voc_recipes.yaml); the visual
# comes from the shared `cups` pool below, sampled per episode with the env RNG.
#
# cups: pool of interchangeable cup meshes. Each entry is a self-contained
#   robosuite object XML (same convention as objects.yaml `xml` geometry) plus
#   optional placement metadata:
#     path          - path to the cup .xml (relative to repo root or absolute)
#     rotation      - null (uniform), scalar (fixed radians), or [low, high]
#     rotation_axis - x / y / z (the turbosquid mugs are modeled lying down, so
#                     an upright pose needs a fixed rotation about x, matching
#                     porcelain_mug's entry in objects.yaml)
#
# liquids: name -> {recipe}. recipe is a dedicated VOC recipe in voc_recipes.yaml
#   (conventionally liquid_<name>). water is the odorless control.

cups:
  - path: odor_sim/assets/objects/porcelain_mug/porcelain_mug.xml
    rotation: [0, 0]
    rotation_axis: x
  - path: odor_sim/assets/objects/white_yellow_mug/white_yellow_mug.xml
    rotation: [0, 0]
    rotation_axis: x
  - path: odor_sim/assets/objects/red_coffee_mug/red_coffee_mug.xml
    rotation: [0, 0]
    rotation_axis: x

liquids:
  water:
    recipe: liquid_water
  coconut_water:
    recipe: liquid_coconut_water
  alcohol:
    recipe: liquid_alcohol
  coke:
    recipe: liquid_coke
  grape_juice:
    recipe: liquid_grape_juice
  wine:
    recipe: liquid_wine
  # Pure single-VOC classes (all 7 MOX gases × 0.3 / 0.7 / 1.0)
  ethanol0.3:
    recipe: liquid_ethanol0.3
  ethanol0.7:
    recipe: liquid_ethanol0.7
  ethanol1.0:
    recipe: liquid_ethanol1.0
  methane0.3:
    recipe: liquid_methane0.3
  methane0.7:
    recipe: liquid_methane0.7
  methane1.0:
    recipe: liquid_methane1.0
  hydrogen0.3:
    recipe: liquid_hydrogen0.3
  hydrogen0.7:
    recipe: liquid_hydrogen0.7
  hydrogen1.0:
    recipe: liquid_hydrogen1.0
  propanol0.3:
    recipe: liquid_propanol0.3
  propanol0.7:
    recipe: liquid_propanol0.7
  propanol1.0:
    recipe: liquid_propanol1.0
  chlorine0.3:
    recipe: liquid_chlorine0.3
  chlorine0.7:
    recipe: liquid_chlorine0.7
  chlorine1.0:
    recipe: liquid_chlorine1.0
  fluorine0.3:
    recipe: liquid_fluorine0.3
  fluorine0.7:
    recipe: liquid_fluorine0.7
  fluorine1.0:
    recipe: liquid_fluorine1.0
  acetone0.3:
    recipe: liquid_acetone0.3
  acetone0.7:
    recipe: liquid_acetone0.7
  acetone1.0:
    recipe: liquid_acetone1.0
