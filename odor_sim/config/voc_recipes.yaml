  #
  # In ClassifyLiquid the *smell* is the liquid and the *look* is a randomly
  # chosen cup mesh, so these recipes are what the policy must classify. Same
  # fixed MOX panel order as the obj_* recipes above (ethanol, methane,
  # hydrogen, propanol, chlorine, fluorine, acetone) so the recorded ppm vector
  # layout is stable across liquids. water is the odorless control (all inert).
